[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --cov=civion --cov-report=html --cov-report=term
timeout = 30
asyncio_mode = auto
markers =
    slow: marks tests as slow
    integration: marks tests as integration
    unit: marks tests as unit
